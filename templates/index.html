<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Data Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .result-box {
            min-height: 200px;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-file-pdf"></i> Data Dashboard</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/">PDF Extractor</a>
                <a class="nav-link" href="/redshift">Redshift Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4"><i class="fas fa-file-pdf"></i> PDF Data Extractor</h1>
        <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> 
            Upload a PDF file and ask questions about its content. Or visit the 
            <a href="/redshift" class="alert-link">Redshift Dashboard</a> to explore database tables.
        </div>
        <div class="mb-4">
            <input type="file" class="form-control" id="pdfFile" accept=".pdf">
            <input type="text" class="form-control mt-2" id="question" placeholder="Ask a question about your PDF (e.g. 'When does the engagement begin and end?')">
            <button class="btn btn-primary mt-2" id="uploadBtn">
                <i class="fas fa-play"></i> Submit
            </button>
        </div>
        <div class="result-box" id="resultBox">
            <p><i class="fas fa-upload"></i> Select a PDF file to extract data</p>
        </div>
    </div>

    <script>
        document.getElementById('uploadBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a PDF file first');
                return;
            }

            // Get the user question
            const question = document.getElementById('question').value;
            const formData = new FormData();
            formData.append('pdf', file);
            formData.append('question', question);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('resultBox').innerHTML = 
                        `<div class="alert alert-danger">${data.error}</div>`;
                } else if (data.answer) {
                    document.getElementById('resultBox').innerHTML = `<h5>Answer</h5><div class='alert alert-success'>${data.answer}</div>`;
                } else {
                    document.getElementById('resultBox').innerHTML = `<div class="alert alert-warning">No answer found.</div>`;
                }
            })
            .catch(error => {
                document.getElementById('resultBox').innerHTML = 
                    `<div class="alert alert-danger">An error occurred: ${error}</div>`;
            });
        });
    </script>
</body>
</html>
