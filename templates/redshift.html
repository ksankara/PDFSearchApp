<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO Schema Dashboard - Veritiv Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .container-fluid {
            margin-top: 20px;
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .query-container {
            margin-top: 20px;
        }
        .nav-pills .nav-link.active {
            background-color: #0d6efd;
        }
        .loading {
            display: none;
        }
        .table-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
        }
        .table-item {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 3px;
            margin-bottom: 2px;
        }
        .table-item:hover {
            background-color: #f8f9fa;
        }
        .table-item.selected {
            background-color: #e3f2fd;
        }
        .schema-header {
            font-weight: bold;
            color: #0d6efd;
            margin-top: 10px;
        }
        .evo-schema {
            background-color: #e8f5e8;
            border: 2px solid #28a745;
            border-radius: 5px;
            padding: 8px;
            margin: 5px 0;
        }
        .evo-schema .schema-header {
            color: #155724;
            font-size: 1.1em;
            margin-top: 0;
        }
        .evo-table-item {
            background-color: #f8fffe;
            border-left: 3px solid #28a745;
        }
        .evo-table-item:hover {
            background-color: #e8f5e8;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="fas fa-database"></i> EVO Schema Dashboard</a>
                <div class="navbar-nav">
                    <a class="nav-link" href="/">PDF Extractor</a>
                    <a class="nav-link active" href="/redshift">EVO Data Explorer</a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="row mt-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-table"></i> Database Tables</h5>
                        <div class="text-muted small">Focus: EVO Schema in Veritiv Database</div>
                        <button class="btn btn-sm btn-outline-primary mt-1" onclick="loadTables()">
                            <i class="fas fa-refresh"></i> Refresh
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <button class="btn btn-sm btn-success w-100 mb-2" onclick="loadEvoTablesOnly()">
                                <i class="fas fa-star"></i> Load EVO Schema Only
                            </button>
                        </div>
                        <div id="tablesContainer" class="table-list">
                            <div class="text-center">
                                <button class="btn btn-primary" onclick="loadTables()">Load All Tables</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9">
                <!-- Tabs -->
                <ul class="nav nav-pills mb-3" id="mainTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="table-tab" data-bs-toggle="pill" data-bs-target="#table-view" type="button" role="tab">
                            <i class="fas fa-table"></i> Table View
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="query-tab" data-bs-toggle="pill" data-bs-target="#query-view" type="button" role="tab">
                            <i class="fas fa-code"></i> Custom Query
                        </button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content" id="mainTabContent">
                    <!-- Table View Tab -->
                    <div class="tab-pane fade show active" id="table-view" role="tabpanel">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 id="tableTitle">Select a table to view data</h5>
                                <div>
                                    <select class="form-select d-inline-block w-auto" id="limitSelect">
                                        <option value="50">50 rows</option>
                                        <option value="100" selected>100 rows</option>
                                        <option value="500">500 rows</option>
                                        <option value="1000">1000 rows</option>
                                    </select>
                                </div>
                            </div>
                            <div class="card-body">
                                <div id="tableDataContainer">
                                    <div class="text-center text-muted">
                                        <i class="fas fa-database fa-3x"></i>
                                        <p class="mt-2">Select a table from the sidebar to view its data</p>
                                    </div>
                                </div>
                                <div class="loading text-center">
                                    <div class="spinner-border" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p>Loading table data...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Custom Query Tab -->
                    <div class="tab-pane fade" id="query-view" role="tabpanel">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-code"></i> Execute Custom Query</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <textarea class="form-control" id="customQuery" rows="6" placeholder="Enter your SELECT query here...
Examples for EVO schema:
SELECT * FROM evo.table_name LIMIT 10;
SELECT COUNT(*) FROM evo.your_table;
SELECT column1, column2 FROM evo.your_table WHERE condition;"></textarea>
                                </div>
                                <button class="btn btn-primary" onclick="executeCustomQuery()">
                                    <i class="fas fa-play"></i> Execute Query
                                </button>
                                <div id="queryResultContainer" class="mt-3">
                                </div>
                                <div class="loading text-center mt-3">
                                    <div class="spinner-border" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p>Executing query...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentTable = null;
        let currentSchema = null;

        // Load tables from Redshift with EVO schema priority
        function loadTables() {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm" role="status"></div> Loading tables...</div>';

            fetch('/api/tables')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        container.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                        return;
                    }

                    let html = '';
                    
                    // Display EVO schema prominently at the top
                    if (data.evo_tables && data.evo_tables.length > 0) {
                        html += `
                            <div class="evo-schema">
                                <div class="schema-header">
                                    <i class="fas fa-star"></i> evo (${data.evo_count} tables)
                                    <small class="text-muted">- Priority Schema</small>
                                </div>
                        `;
                        data.evo_tables.forEach(table => {
                            html += `<div class="table-item evo-table-item" onclick="selectTable('${table.schema}', '${table.table}')">${table.table}</div>`;
                        });
                        html += '</div>';
                    }

                    // Group remaining tables by schema (excluding evo since we showed it above)
                    const schemas = {};
                    data.tables.forEach(table => {
                        if (table.schema !== 'evo') {  // Skip evo, we already displayed it
                            if (!schemas[table.schema]) {
                                schemas[table.schema] = [];
                            }
                            schemas[table.schema].push(table.table);
                        }
                    });

                    // Display other schemas below EVO
                    if (Object.keys(schemas).length > 0) {
                        html += '<div style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">';
                        html += '<div class="text-muted small mb-2">Other Schemas:</div>';
                        
                        Object.keys(schemas).sort().forEach(schema => {
                            html += `<div class="schema-header">${schema} (${schemas[schema].length})</div>`;
                            schemas[schema].sort().forEach(table => {
                                html += `<div class="table-item" onclick="selectTable('${schema}', '${table}')">${table}</div>`;
                            });
                        });
                        html += '</div>';
                    }

                    container.innerHTML = html;
                    
                    // Auto-select first EVO table if available
                    if (data.evo_tables && data.evo_tables.length > 0) {
                        const firstEvoTable = data.evo_tables[0];
                        setTimeout(() => {
                            selectTable(firstEvoTable.schema, firstEvoTable.table);
                            // Highlight the first evo table
                            const firstEvoElement = document.querySelector('.evo-table-item');
                            if (firstEvoElement) {
                                firstEvoElement.classList.add('selected');
                            }
                        }, 500);
                    }
                })
                .catch(error => {
                    container.innerHTML = `<div class="alert alert-danger">Error loading tables: ${error.message}</div>`;
                });
        }

        // Load only EVO schema tables
        function loadEvoTablesOnly() {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm" role="status"></div> Loading EVO tables...</div>';

            fetch('/api/evo-tables')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        container.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                        return;
                    }

                    let html = `
                        <div class="evo-schema">
                            <div class="schema-header">
                                <i class="fas fa-star"></i> evo (${data.count} tables)
                                <small class="text-success">- Active Schema</small>
                            </div>
                    `;
                    
                    data.tables.forEach(table => {
                        html += `<div class="table-item evo-table-item" onclick="selectTable('${table.schema}', '${table.table}')">${table.table}</div>`;
                    });
                    
                    html += '</div>';
                    html += '<div class="text-center mt-3"><button class="btn btn-sm btn-outline-secondary" onclick="loadTables()">Show All Schemas</button></div>';

                    container.innerHTML = html;
                    
                    // Auto-select first table if available
                    if (data.tables && data.tables.length > 0) {
                        const firstTable = data.tables[0];
                        setTimeout(() => {
                            selectTable(firstTable.schema, firstTable.table);
                            const firstElement = document.querySelector('.evo-table-item');
                            if (firstElement) {
                                firstElement.classList.add('selected');
                            }
                        }, 300);
                    }
                })
                .catch(error => {
                    container.innerHTML = `<div class="alert alert-danger">Error loading EVO tables: ${error.message}</div>`;
                });
        }

        // Select a table and load its data
        function selectTable(schema, table) {
            // Update UI
            document.querySelectorAll('.table-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.classList.add('selected');

            currentSchema = schema;
            currentTable = table;

            document.getElementById('tableTitle').textContent = `${schema}.${table}`;
            loadTableData();
        }

        // Load data for the selected table
        function loadTableData() {
            if (!currentSchema || !currentTable) return;

            const container = document.getElementById('tableDataContainer');
            const loading = document.querySelector('#table-view .loading');
            const limit = document.getElementById('limitSelect').value;

            container.style.display = 'none';
            loading.style.display = 'block';

            fetch('/api/table-data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    schema: currentSchema,
                    table: currentTable,
                    limit: parseInt(limit)
                })
            })
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';
                    container.style.display = 'block';

                    if (data.error) {
                        container.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                        return;
                    }

                    displayTableData(data);
                })
                .catch(error => {
                    loading.style.display = 'none';
                    container.style.display = 'block';
                    container.innerHTML = `<div class="alert alert-danger">Error loading table data: ${error.message}</div>`;
                });
        }

        // Display table data
        function displayTableData(data) {
            const container = document.getElementById('tableDataContainer');

            if (!data.data || data.data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No data found in this table.</div>';
                return;
            }

            // Create table
            let html = `
                <div class="mb-2">
                    <small class="text-muted">Showing ${data.row_count} rows</small>
                </div>
                <div class="table-container">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark sticky-top">
                            <tr>
            `;

            // Table headers
            Object.keys(data.data[0]).forEach(column => {
                html += `<th>${column}</th>`;
            });
            html += '</tr></thead><tbody>';

            // Table rows
            data.data.forEach(row => {
                html += '<tr>';
                Object.values(row).forEach(value => {
                    const displayValue = value === null ? '<em>NULL</em>' : String(value);
                    html += `<td>${displayValue}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // Execute custom query
        function executeCustomQuery() {
            const query = document.getElementById('customQuery').value.trim();
            if (!query) {
                alert('Please enter a query');
                return;
            }

            const container = document.getElementById('queryResultContainer');
            const loading = document.querySelector('#query-view .loading');

            container.style.display = 'none';
            loading.style.display = 'block';

            fetch('/api/custom-query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query })
            })
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';
                    container.style.display = 'block';

                    if (data.error) {
                        container.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                        return;
                    }

                    displayQueryResult(data);
                })
                .catch(error => {
                    loading.style.display = 'none';
                    container.style.display = 'block';
                    container.innerHTML = `<div class="alert alert-danger">Error executing query: ${error.message}</div>`;
                });
        }

        // Display query result
        function displayQueryResult(data) {
            const container = document.getElementById('queryResultContainer');

            if (!data.data || data.data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">Query executed successfully but returned no results.</div>';
                return;
            }

            // Create table
            let html = `
                <div class="mb-2">
                    <small class="text-muted">Query returned ${data.row_count} rows</small>
                </div>
                <div class="table-container">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark sticky-top">
                            <tr>
            `;

            // Table headers
            Object.keys(data.data[0]).forEach(column => {
                html += `<th>${column}</th>`;
            });
            html += '</tr></thead><tbody>';

            // Table rows
            data.data.forEach(row => {
                html += '<tr>';
                Object.values(row).forEach(value => {
                    const displayValue = value === null ? '<em>NULL</em>' : String(value);
                    html += `<td>${displayValue}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // Event listener for limit change
        document.getElementById('limitSelect').addEventListener('change', () => {
            if (currentTable && currentSchema) {
                loadTableData();
            }
        });

        // Load tables on page load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadTables, 500);
        });
    </script>
</body>
</html>
